<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <!-- Book stack icon -->
  <!-- Bottom book -->
  <rect x="4" y="30" width="36" height="14" rx="2" fill="#059669"/>
  <!-- Middle book -->
  <rect x="4" y="18" width="34" height="14" rx="2" fill="#10b981"/>
  <!-- Top book -->
  <rect x="4" y="6" width="32" height="14" rx="2" fill="#34d399"/>
  <!-- Spine lines -->
  <rect x="4" y="30" width="4" height="14" rx="1" fill="#047857"/>
  <rect x="4" y="18" width="4" height="14" rx="1" fill="#059669"/>
  <rect x="4" y="6"  width="4" height="14" rx="1" fill="#10b981"/>

  <!-- SOPDS text -->
  <text x="50" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="800" fill="#d1fae5" letter-spacing="1">SOPDS</text>
  <!-- MODERN text -->
  <text x="51" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="500" fill="#34d399" letter-spacing="3">MODERN</text>
</svg>
