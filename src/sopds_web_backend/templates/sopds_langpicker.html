{% extends "sopds_main.html" %}
{% load i18n %}

{% block body %}
{% for key, value in lang_menu.items %}
<div class="cell sopdsitem">
    <a class="sopdsitem-link" href="{{ picker_url }}?lang={{ key }}">
        <span class="sopdsitem-key">{{ value }}</span>
    </a>
</div>
{% endfor %}
{% endblock %}
