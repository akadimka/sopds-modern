{% load static %}
{% load i18n %}


<div class="cell small-12">
  <form method="get" action="{% url "web:searchbooks" %}" id="searchform" data-abide>
  {% csrf_token %}
    <div class="input-group button-group">
		<input class="input-group-field" type="search" name="searchterms" placeholder="Search" id="main_searchbox" data-validator="SearchLenghtValidator" required
		       hx-post="{% url "web:suggest" %}"
		       hx-trigger="keyup changed delay:300ms, search"
		       hx-target="#search-suggestions"
		       hx-indicator="#search-spinner"
		       hx-include="#searchtype-hidden"
		       autocomplete="off">
		<input type="hidden" name="type" id="searchtype-hidden" value="title">

		<div class="input-group-button" style="position:relative;">
		     <button class="button" type="submit" name="submit_form">{% trans "Search" %}</button>
		     <button type="button" class="button sopds-arrow-only" id="search_selector" onclick="toggleSearchDropdown()" aria-haspopup="true">▾</button>
		     <div id="search-dropdown" style="display:none; position:absolute; right:0; top:100%; z-index:200; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:0.75rem 1rem; min-width:220px; box-shadow:0 4px 16px rgba(0,0,0,0.3);">
		         <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:0.5rem;">{% trans "Choose Search Type:" %}</div>
		         <label style="display:flex; align-items:center; gap:0.5rem; padding:0.25rem 0; cursor:pointer;">
		             <input type="radio" name="searchtype" value="m" id="srch-title" data-text="{% trans "Search by name" %}" onchange="applySearchType(this)" {% if searchobject == "title" or not searchobject %}checked{% endif %}> {% trans "Title" %}
		         </label>
		         <label style="display:flex; align-items:center; gap:0.5rem; padding:0.25rem 0; cursor:pointer;">
		             <input type="radio" name="searchtype" value="m" id="srch-author" data-text="{% trans "Search by author" %}" onchange="applySearchType(this)" {% if searchobject == "author" %}checked{% endif %}> {% trans "Author" %}
		         </label>
		         <label style="display:flex; align-items:center; gap:0.5rem; padding:0.25rem 0; cursor:pointer;">
		             <input type="radio" name="searchtype" value="m" id="srch-series" data-text="{% trans "Search by series" %}" onchange="applySearchType(this)" {% if searchobject == "series" %}checked{% endif %}> {% trans "Series" %}
		         </label>
		     </div>
		</div>

		<input type="hidden" name="page" value="0">
	</div>
    <label class="form-error" data-form-error-for="main_searchbox">{% trans "Please, fill the field" %}</label>
    <div id="search-suggestions" class="sopds-suggestions"></div>
    <div id="search-spinner" class="htmx-indicator" style="display:none;">
        <span class="label secondary">{% trans "Searching..." %}</span>
    </div>
  </form>
</div>

<script>
function toggleSearchDropdown() {
    var dd = document.getElementById('search-dropdown');
    dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', function(e) {
    if (!document.getElementById('search_selector').contains(e.target)) {
        document.getElementById('search-dropdown').style.display = 'none';
    }
});
function applySearchType(el) {
    document.getElementById('main_searchbox').placeholder = el.getAttribute('data-text');
    if (el.id === 'srch-title')  { document.getElementById('searchtype-hidden').value = 'title';  document.getElementById('searchform').action = "{% url "web:searchbooks" %}"; }
    if (el.id === 'srch-author') { document.getElementById('searchtype-hidden').value = 'author'; document.getElementById('searchform').action = "{% url "web:searchauthors" %}"; }
    if (el.id === 'srch-series') { document.getElementById('searchtype-hidden').value = 'series'; document.getElementById('searchform').action = "{% url "web:searchseries" %}"; }
    document.getElementById('search-dropdown').style.display = 'none';
}
</script>
