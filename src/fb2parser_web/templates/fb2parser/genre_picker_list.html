{% load i18n %}
{% if error %}
<div style="padding:0.7rem; color:#c0392b; font-size:0.82rem;">⚠ {{ error }}</div>
{% elif names %}
{% for name in names %}
<div class="gp-item" onclick="gpSelectGenre('{{ name|escapejs }}', this)"
     data-name="{{ name|lower }}"
     style="padding:0.28rem 0.7rem; cursor:pointer; font-size:0.82rem; border-bottom:1px solid #f5f5f5;">
    {{ name }}
</div>
{% endfor %}
{% else %}
<div style="padding:0.7rem; color:#7f8c8d; font-size:0.82rem;">{% trans "Genres not found" %}</div>
{% endif %}
