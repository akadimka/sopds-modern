name: CI

on:
  push:
    branches:
      - dev
      - master

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container:
      image: python:3.13-slim

    steps:
      - name: Install git and basic tools
        run: |
          apt-get update
          apt-get install -y git

      - name: Checkout repository (git clone)
        run: |
          git clone --depth 1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Install uv
        run: pip install uv

      - name: Install dependencies (including dev)
        run: uv sync --group dev

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy .

      - name: Run pytest
        env:
          DJANGO_SETTINGS_MODULE: "sopds.settings.test"
          SECRET_KEY: "django-insecure-ci-dummy-key"
          SOPDS_BOOK_PATH: "/tmp/books"
          SOPDS_DB_ENGINE: "sqlite"
        run: uv run pytest --disable-benchmark
